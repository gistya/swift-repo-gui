name: Release Installer

# Builds SwiftRepoGUI, signs it with your Developer ID, wraps it in a signed .pkg installer,
# notarizes and staples it, then publishes the installer so people can download and run it locally.
#
# Trigger by pushing a version tag (e.g. `git tag v0.7.6 && git push origin v0.7.6`) — the signed,
# notarized installer is attached to a GitHub Release. `workflow_dispatch` builds one on demand and
# uploads it as a build artifact instead.
#
# Required repository secrets are documented in ci/RELEASE.md.

on:
  push:
    tags:
      - "v*"       # v0.7.6
      - "[0-9]*"   # 0.7.6  (your existing convention)
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (defaults to the app's MARKETING_VERSION)"
        required: false

concurrency:
  group: release-installer-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT: SwiftRepoGUI.xcodeproj
  SCHEME: SwiftRepoGUI-Release
  CONFIGURATION: Release
  APP_NAME: SwiftRepoGUI
  PRODUCT_BUNDLE_ID: com.physicalsoftware.SwiftRepoGUI
  TEAM_ID: Y453UXCT86

jobs:
  build-installer:
    # Requires an Xcode 26.x toolchain (the app uses Swift 6.2 default-actor isolation).
    # If GitHub's hosted images don't yet carry Xcode 26, switch this to a self-hosted macOS
    # runner that has it. See ci/RELEASE.md.
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write # needed to attach the installer to a GitHub Release on tag builds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          # Pick the newest Xcode 26.x available on the runner.
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$XC" ]; then XC=/Applications/Xcode.app; fi
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V=$(grep -m1 'MARKETING_VERSION' "$PROJECT/project.pbxproj" | sed 's/.*= //; s/;//' | tr -d ' ')
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Installer version: $V"

      - name: Import signing certificates
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certs.p12"

          echo "$CERTIFICATES_P12" | base64 --decode > "$CERT_PATH"

          # A dedicated, ephemeral keychain that lives only for this job.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Import BOTH Developer ID certs (Application + Installer) from the one .p12.
          security import "$CERT_PATH" -P "$CERTIFICATES_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"

          # Let codesign/productbuild use the private keys without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          # Put our keychain first in the search list AND make it the default — xcodebuild's
          # -exportArchive only looks in the default keychain, so the search list alone isn't enough.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -d user -s "$KEYCHAIN"
          # Re-unlock after switching default (belt-and-suspenders against auto-lock during the build).
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "Signing identities available:"
          security find-identity -v "$KEYCHAIN"
          rm -f "$CERT_PATH"

          # Fail early with a clear message if the .p12 is missing either Developer ID cert (the usual
          # cause: exporting the wrong certs, or exporting the certificate without its private key).
          if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep -q "Developer ID Application"; then
            echo "::error::CERTIFICATES_P12 has no 'Developer ID Application' identity with a private key. Export BOTH Developer ID certs *with their private keys* into one .p12 (Keychain Access → My Certificates → select both → Export). See ci/RELEASE.md."
            exit 1
          fi
          if ! security find-identity -v "$KEYCHAIN" | grep -q "Developer ID Installer"; then
            echo "::error::CERTIFICATES_P12 has no 'Developer ID Installer' identity. Export BOTH Developer ID certs into one .p12. See ci/RELEASE.md."
            exit 1
          fi

      - name: Archive (unsigned)
        run: |
          set -euo pipefail
          # Archive WITHOUT signing. A global CODE_SIGN_IDENTITY override would force every Swift
          # package target (e.g. SwiftXState_SwiftXStateInspectorUI) to sign with Developer ID and
          # fail. All Developer ID signing — the app plus every embedded framework, with hardened
          # runtime and a secure timestamp — is done once in the export step below.
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Export signed .app
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportOptionsPlist ci/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"
          ls -la "$RUNNER_TEMP/export"
          # Sanity: the app must be signed with Developer ID + hardened runtime.
          codesign --verify --strict --verbose=2 "$RUNNER_TEMP/export/$APP_NAME.app"
          codesign --display --verbose=4 "$RUNNER_TEMP/export/$APP_NAME.app" 2>&1 | grep -E "Authority|flags" || true

      - name: Build signed installer (.pkg)
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/export/$APP_NAME.app"
          PKG="$RUNNER_TEMP/$APP_NAME-${{ steps.version.outputs.version }}.pkg"
          productbuild \
            --component "$APP" /Applications \
            --identifier "$PRODUCT_BUNDLE_ID.pkg" \
            --version "${{ steps.version.outputs.version }}" \
            --sign "Developer ID Installer" \
            "$PKG"
          pkgutil --check-signature "$PKG"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Notarize and staple
        env:
          NOTARY_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          NOTARY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEYFILE="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$NOTARY_KEY" > "$KEYFILE"

          # --wait blocks until Apple finishes; a non-"Accepted" status fails the job.
          xcrun notarytool submit "$PKG" \
            --key "$KEYFILE" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait

          # Staple the ticket so the installer validates offline after download.
          xcrun stapler staple "$PKG"
          xcrun stapler validate "$PKG"
          # Gatekeeper's own verdict for an installer package.
          spctl --assess --type install --verbose=4 "$PKG" || true
          rm -f "$KEYFILE"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}-installer
          path: ${{ env.PKG }}
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG }}
          fail_on_unmatched_files: true
          generate_release_notes: true
